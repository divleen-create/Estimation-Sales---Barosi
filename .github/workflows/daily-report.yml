name: Daily Sales Report

on:
  schedule:
    - cron: '15 6 * * *'   # 11:45 AM IST (06:15 UTC)
  workflow_dispatch:

permissions:
  contents: write            # allow the job to push index.html back to the repo

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pillow google-api-python-client google-auth

      - name: Pull live sheets (required)
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT_KEY" ]; then
            echo "::error::GCP_SERVICE_ACCOUNT_KEY secret is empty or missing."
            exit 1
          fi
          printf '%s' "$GCP_SERVICE_ACCOUNT_KEY" > /tmp/key.json
          # Fail fast with a clear message if the secret isn't valid JSON.
          python -c "import json; json.load(open('/tmp/key.json')); print('Service-account key JSON is valid.')" \
            || { echo "::error::GCP_SERVICE_ACCOUNT_KEY is not valid JSON - re-paste the full key file."; exit 1; }
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/key.json
          python -c "import gsheets; gsheets.fetch_snapshots()"
          echo "Live sheets pulled successfully."

      - name: Build report
        # --strict: abort (non-zero exit) if the numbers don't reconcile against the
        # sheet's OWN totals / internal identities, so discrepant data is never published.
        run: python main.py --no-image --strict

      - name: Commit and push updated report
        run: |
          cp output/index.html index.html
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html output/
          git diff --cached --quiet || git commit -m "Auto-update daily report"
          git push origin HEAD:main
